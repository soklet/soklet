name: CI

on:
  push:
    branches: [master, develop, 'feature/**']
  pull_request:
  schedule:
    # Nightly coverage-guided fuzzing and soak tests. PR/push jobs replay the corpus deterministically.
    - cron: '23 8 * * *'
  workflow_dispatch:

# Cancel superseded runs on the same ref to save time and reduce noise.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (JDK ${{ matrix.jdk }})
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    strategy:
      # Do not cancel the 21/25 jobs if 17 fails — we want every JDK's result.
      fail-fast: false
      matrix:
        # 17 exercises the platform-thread fallback path; 21+ exercises virtual threads.
        jdk: ['17', '21', '25']
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up JDK ${{ matrix.jdk }}
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: ${{ matrix.jdk }}
          cache: maven

      - name: Run tests
        run: mvn -B -ntp test

      - name: Build Javadoc
        run: mvn -B -ntp javadoc:javadoc

      - name: Compile benchmarks
        run: mvn -B -ntp -f benchmarks/pom.xml -DskipTests compile

  fuzz-regression:
    name: Fuzz Corpus Replay (JDK 25)
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: '25'
          cache: maven

      - name: Replay fuzz corpus
        run: mvn -B -ntp -f fuzz/pom.xml test

  soak-smoke:
    name: Soak Smoke (JDK 25)
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: '25'
          cache: maven

      - name: Run soak smoke tests
        run: mvn -B -ntp -f soak/pom.xml test

  static-analysis:
    name: Static Analysis (JDK 21)
    # Error Prone requires JDK 21+ to run and lags the newest JDKs, so this gate pins JDK 21 while
    # the build's release target stays 17. NullAway runs as advisory WARN visibility (it does not
    # fail the build); the gate fails only on Error Prone's default-ERROR checks. Opinionated style
    # checks are disabled in the static-analysis Maven profile.
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: '21'
          cache: maven

      - name: Error Prone + NullAway
        run: mvn -B -ntp -Pstatic-analysis clean compile

  spotbugs:
    name: SpotBugs (JDK 21)
    # SpotBugs runs as a separate opt-in gate so the normal test matrix and release-17 compile path stay
    # unchanged. The Maven profile carries a reviewed baseline for low-signal categories and fails on any
    # unfiltered findings.
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: '21'
          cache: maven

      - name: Run SpotBugs
        run: mvn -B -ntp -Pspotbugs -DskipTests compile spotbugs:check

  fuzz-nightly:
    name: Nightly Fuzzing (JDK 25, ${{ matrix.target_id }})
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      # Jazzer/JUnit can run only one @FuzzTest per JVM when JAZZER_FUZZ=1.
      # Keep each target in its own Maven invocation so every parser gets a nightly slot.
      fail-fast: false
      matrix:
        include:
          - target_id: mcp-json-parse
            test_selector: McpJsonCodecFuzzTest#parseArbitraryBytesOnlyRejectsWithIllegalArgumentException
          - target_id: mcp-json-round-trip
            test_selector: McpJsonCodecFuzzTest#parseSerializeParseRoundTripsStructurally
          - target_id: request-parser
            test_selector: RequestParserFuzzTest#parseIncrementalRequestOnlyRejectsWithDeclaredExceptions
          - target_id: multipart-parser
            test_selector: DefaultMultipartParserFuzzTest#extractMultipartFieldsOnlyRejectsWithExpectedExceptions
          - target_id: http-date
            test_selector: HttpDateFuzzTest#fromHeaderValueNeverThrows
          - target_id: parameterized-header-value
            test_selector: ParameterizedHeaderValueFuzzTest#builderOnlyRejectsWithIllegalArgumentException
          - target_id: query-format
            test_selector: QueryFormatFuzzTest#extractQueryParametersOnlyRejectsWithIllegalRequestException
          - target_id: response-cookie
            test_selector: ResponseCookieFuzzTest#fromSetCookieHeaderRepresentationOnlyRejectsWithIllegalArgumentException
          - target_id: trace-context
            test_selector: TraceContextFuzzTest#fromHeaderValuesNeverThrows
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: '25'
          cache: maven

      - name: Restore Jazzer corpus
        uses: actions/cache@v4
        with:
          path: fuzz/.cifuzz-corpus
          key: jazzer-${{ runner.os }}-${{ github.ref_name }}-${{ matrix.target_id }}-${{ github.run_id }}
          restore-keys: |
            jazzer-${{ runner.os }}-${{ github.ref_name }}-${{ matrix.target_id }}-
            jazzer-${{ runner.os }}-${{ github.ref_name }}-
            jazzer-${{ runner.os }}-

      - name: Run fuzz targets
        run: JAZZER_FUZZ=1 mvn -B -ntp -f fuzz/pom.xml -Dtest="${{ matrix.test_selector }}" -Djazzer.max_duration=5m test

      - name: Upload fuzz artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jazzer-${{ matrix.target_id }}-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            fuzz/.cifuzz-corpus
            fuzz/src/test/resources
            fuzz/target/surefire-reports

  soak-nightly:
    name: Nightly Soak (JDK 25)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: '25'
          cache: maven

      - name: Run soak tests
        run: SOKLET_SOAK=1 mvn -B -ntp -f soak/pom.xml test

      - name: Upload soak reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soak-${{ github.run_id }}
          if-no-files-found: ignore
          path: soak/target/surefire-reports
